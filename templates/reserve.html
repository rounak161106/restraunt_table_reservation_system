<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserve Table</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        #form-body{
            width: 280px;
            height: 380px;
        }
    </style>
</head>
<body>
    <div id="main">
        <div id="canva">
            <div id="form-body">
                <h2>Reserve Table</h2>
                <div class="mb-3">
                    <label for="table_number" class="form-label">Table Number</label>
                    <input class="form-control" type="text" value="T1" aria-label="Disabled input example" disabled readonly>
                </div>

                <div class="mb-3">
                    <label for="date" class="form-label">Date</label>
                    <input type="date" class="form-control" id="date">
                </div>

                <div class="mb-3">
                    <label for="time" class="form-label">Time Slot</label>
                    <input type="text" class="form-control" id="time" placeholder="eg. 7PM-9PM">
                </div>                

                <div class="text-center">
                    <input type="submit" class="btn btn-primary" value="Request">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
